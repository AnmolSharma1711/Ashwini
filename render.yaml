services:
  - type: web
    name: ashwini-backend
    runtime: python
    plan: free  # Change to 'starter' or higher for production
    buildCommand: cd backend && bash build.sh
    startCommand: cd backend && bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.12
      - key: DJANGO_SETTINGS_MODULE
        value: ashwini_backend.settings
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true  # Render will generate a secure secret key
      - key: ALLOWED_HOSTS
        sync: false  # You'll set this manually to your Render domain
      - key: CORS_ALLOW_ALL_ORIGINS
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: ashwini-db
          property: connectionString
    healthCheckPath: /api/health/

databases:
  - name: ashwini-db
    plan: free  # Free PostgreSQL database
    databaseName: ashwini
    user: ashwini
