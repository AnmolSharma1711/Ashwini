name: Keep Render Backend Alive

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "Pinging backend to keep it alive..."
          curl -f https://ashwini-backend.onrender.com/api/health/ || echo "Backend might be sleeping, waking it up..."
          sleep 5
          curl -f https://ashwini-backend.onrender.com/api/health/ && echo "Backend is alive!"
